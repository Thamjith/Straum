<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Straum">
  <title>Straum</title>
  <style>
    .bg {
      fill: #0a0a0a;
    }
    .mark {
      fill: #6ec4bc;
      stroke: #6ec4bc;
    }
    @media (prefers-color-scheme: light) {
      .bg {
        fill: #fafafa;
      }
      .mark {
        fill: #2a8f87;
        stroke: #2a8f87;
      }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="8" />
  <!-- Straum mark: direct peer-to-peer (two nodes, one line) -->
  <circle class="mark" cx="9" cy="16" r="3.25" />
  <circle class="mark" cx="23" cy="16" r="3.25" />
  <line class="mark" x1="12.25" y1="16" x2="19.75" y2="16" fill="none" stroke-width="2.25" stroke-linecap="round" />
</svg>
